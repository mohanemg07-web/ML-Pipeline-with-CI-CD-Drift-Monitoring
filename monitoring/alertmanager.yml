# Alertmanager: routes every alert to a local webhook logger (the alert-webhook
# service in docker-compose), which prints the JSON payload it receives.
#
# HONEST SCOPE: no PagerDuty/Opsgenie/Slack is wired — the claim this stack
# supports is "Alertmanager webhook alerting", demonstrated end to end against
# the local receiver. A pager integration would replace the receiver below.
route:
  receiver: local-webhook
  group_by: [alertname]
  group_wait: 15s
  group_interval: 1m
  repeat_interval: 4h

receivers:
  - name: local-webhook
    webhook_configs:
      - url: http://alert-webhook:9095/alerts
        send_resolved: true
