# Placeholder — completed in Phase 5.
# Prometheus (running locally in docker-compose) scrapes the LIVE Render
# /metrics endpoint over the public internet.
global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: churn-serving
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets: []   # <render-service-host> set in Phase 5
