# CI/CD: lint -> data validation -> tests+coverage -> quality gate -> image -> deploy.
#
# Design (see NOTES.md "Phase 4: CI design"):
# - Fully self-contained: no DagsHub credentials, no data downloads. GE and the
#   tests run on the committed fixture (tests/fixtures/sample.csv); the quality
#   gate reads the committed eval/results/training_metrics.json.
# - Fail-fast ordering: ruff runs before the heavy pip install; everything cheap
#   runs before the Docker build.
# - GHCR push uses the built-in GITHUB_TOKEN (packages: write) — no PAT.
# - Deploys on EVERY push to main (no paths filter): the serving image bakes in
#   src/, serving/, and the bundled model, so a paths filter risks the deployed
#   image silently diverging from HEAD.
# - PRs run checks + a build; only pushes to main publish the image and deploy.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  checks:
    name: Lint, validate, test, quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      # Cheapest check first: lint needs only ruff, not the full ML stack.
      - name: Lint (ruff)
        run: |
          pip install ruff==0.8.4
          ruff check .

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Data validation (Great Expectations on committed fixture)
        run: python -m src.validate tests/fixtures/sample.csv

      - name: Tests with coverage
        run: >
          python -m pytest
          --cov=src --cov=serving
          --cov-report=term
          --cov-report=json:coverage.json

      - name: Report measured coverage
        run: |
          python - <<'EOF'
          import json, os
          pct = json.load(open("coverage.json"))["totals"]["percent_covered"]
          line = f"**Measured test coverage: {pct:.1f}%** (src/ + serving/, pytest-cov)"
          print(line)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(line + "\n\n")
          EOF

      - name: Quality gate (champion test ROC-AUC vs config.AUC_GATE)
        run: |
          python - <<'EOF'
          import json, os, sys
          from src import config
          metrics = json.load(open("eval/results/training_metrics.json"))
          auc = metrics["champion_test_roc_auc"]
          gate = config.AUC_GATE
          ok = auc >= gate
          line = (
              f"**Quality gate {'PASSED' if ok else 'FAILED'}:** champion test "
              f"ROC-AUC {auc:.4f} {'>=' if ok else '<'} gate {gate:.2f}"
          )
          print(line)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(line + "\n")
          sys.exit(0 if ok else 1)
          EOF

  build-and-deploy:
    name: Docker build, GHCR push, Render deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: checks
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # GHCR image names must be lowercase; the repo name is mixed-case.
      - name: Compute image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # PRs get a build-only smoke check; pushes to main also publish the image.
      - name: Build serving image (push to GHCR on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: serving/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render deploy
        if: github.event_name == 'push'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set" >&2
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy triggered for ${GITHUB_SHA}"
